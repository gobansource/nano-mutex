name: Publish nano-mutex

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
          - stable
      version_bump:
        description: "Version bump (ignored for stable — uses current version)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish nano-mutex
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Determine version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          BASE=$(echo "$CURRENT" | sed 's/-.*//')

          if [[ "${{ inputs.release_type }}" == "stable" ]]; then
            NEW_VERSION="$BASE"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            case "${{ inputs.version_bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            BUMPED="${MAJOR}.${MINOR}.${PATCH}"

            TAG="${{ inputs.release_type }}"
            EXISTING=$(npm view nano-mutex versions --json 2>/dev/null | grep "\"${BUMPED}-${TAG}\." | wc -l || echo "0")
            PRE_NUM=$(echo "$EXISTING" | tr -d ' ')

            NEW_VERSION="${BUMPED}-${TAG}.${PRE_NUM}"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$([[ '${{ inputs.release_type }}' == 'stable' ]] && echo 'latest' || echo '${{ inputs.release_type }}')" >> "$GITHUB_OUTPUT"
          echo "📦 Will publish nano-mutex@${NEW_VERSION} with tag: $([[ '${{ inputs.release_type }}' == 'stable' ]] && echo 'latest' || echo '${{ inputs.release_type }}')"

      - name: Set version in package.json
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [[ "$CURRENT" != "${{ steps.version.outputs.version }}" ]]; then
            npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          else
            echo "Version already set to $CURRENT, skipping"
          fi

      - name: Production build
        run: npm run build

      - name: Verify build artifacts
        run: |
          echo "=== Build output ==="
          ls -lh dist/
          echo ""
          echo "=== Package contents ==="
          npm pack --dry-run 2>&1

      - name: Publish to npm
        if: ${{ inputs.dry_run == false }}
        run: npm publish --provenance --tag ${{ steps.version.outputs.tag }}

      - name: Dry run publish
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "🏜️ DRY RUN — would publish:"
          echo "  Package: nano-mutex@${{ steps.version.outputs.version }}"
          echo "  Tag: ${{ steps.version.outputs.tag }}"
          npm pack --dry-run

      - name: Create git tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
